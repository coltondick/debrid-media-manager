name: Build and publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - upstream-sync

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine included upstream commit
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/debridmediamanager/debrid-media-manager.git 2>/dev/null             || git remote set-url upstream https://github.com/debridmediamanager/debrid-media-manager.git

          git fetch --no-tags upstream main

          upstream_sha="$(git merge-base HEAD upstream/main)"

          if [[ -z "${upstream_sha}" ]]; then
            echo "Unable to determine the upstream commit included in this fork." >&2
            exit 1
          fi

          echo "sha=${upstream_sha}" >> "${GITHUB_OUTPUT}"
          echo "Building upstream version ${upstream_sha}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Debrid Media Manager
            org.opencontainers.image.description=Precompiled Debrid Media Manager image
            org.opencontainers.image.version=${{ steps.version.outputs.sha }}
            org.opencontainers.image.revision=${{ steps.version.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## Published Docker image"
            echo
            echo '```text'
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha }}"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
